<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>카카오뱅크</title>

    <!-- Font Awesome 불러오기 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <!-- Tailwind css 불러오기 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- 공통 css 연결 -->
    <link rel="stylesheet" href="./css/style.css" />
    <!-- 공통 js 연결 -->
    <script defer src="./js/script.js"></script>
  </head>
  <body>
    <div class="site-wrap">
      <header id="header" class="h-[62px] fixed inset-x-0">
        <div class="header-inner con flex h-full justify-between">
          <div class="header__left flex items-center">
            <a href="#" class="logo" aria-label="카카오뱅크 홈으로"></a>
          </div>
          <div class="depth2-nav-bg">
            <div class="depth2-bg-bx"></div>
          </div>
          <div class="header__mid">
            <nav class="menu-wrap h-full">
              <ul class="depth1 flex h-full">
                <li class="depth1-list">
                  <a class="depth1-link" aria-label="소개" href="#">소개</a>
                  <div class="depth2-menu-wrap">
                    <div class="depth2-menu-inner">
                      <ul aria-label="회사정보">
                        <li><a href="#">회사소개</a></li>
                        <li><a href="#">윤리경영</a></li>
                        <li><a href="#">브랜드 리소스</a></li>
                        <li><a href="#">오시는 길</a></li>
                      </ul>
                      <ul aria-label="공지 및 문의사항">
                        <li><a href="#">공지사항</a></li>
                        <li><a href="#">제휴문의</a></li>
                        <li>
                          <a href="#"
                            >입찰공고
                            <img src="./assets/images/ic-lg-outlink.svg" class="icon-outlink" alt="외부 링크 아이콘" />
                          </a>
                        </li>
                      </ul>
                    </div>
                  </div>
                </li>
                <li class="depth1-list"><a class="depth1-link" aria-label="서비스" href="#">서비스</a></li>
                <li class="depth1-list"><a class="depth1-link" aria-label="ESG" href="#">ESG</a></li>
                <li class="depth1-list"><a class="depth1-link" aria-label="미디어" href="#">미디어</a></li>
                <li class="depth1-list">
                  <a class="depth1-link" aria-label="투자정보" href="#">투자정보</a>
                  <div class="depth2-menu-wrap">
                    <div class="depth2-menu-inner">
                      <ul aria-label="투자정보">
                        <li><a href="#">주요정보</a></li>
                        <li><a href="#">공시정보</a></li>
                        <li><a href="#">경영정보</a></li>
                        <li><a href="#">재무정보</a></li>
                      </ul>
                      <ul aria-label="IR 자료">
                        <li><a href="#">IR자료실</a></li>
                        <li><a href="#">IR일정</a></li>
                        <li><a href="#">IR공지</a></li>
                        <li><a href="#">공고</a></li>
                      </ul>
                    </div>
                  </div>
                </li>
                <li class="depth1-list">
                  <a class="depth1-link" aria-label="고객센터" href="#">
                    <span>고객센터</span>
                    <img src="./assets/images/ic-lg-outlink.svg" class="icon-outlink" alt="외부 링크 아이콘" />
                  </a>
                </li>
                <li class="depth1-list">
                  <a class="depth1-link" aria-label="인재영입" href="#">
                    <span>인재영입</span>
                    <img src="./assets/images/ic-lg-outlink.svg" class="icon-outlink" alt="외부 링크 아이콘"
                  /></a>
                </li>
              </ul>
            </nav>
          </div>
          <div class="header__right flex items-center">
            <nav class="select-lang-menu">
              <ul class="flex">
                <li>
                  <a href="#" class="ic-link ko-link"></a>
                </li>
                <li>
                  <a href="#" class="ic-link en-link"></a>
                </li>
              </ul>
            </nav>
            <div class="mobile-menu-open">
              <button type="button" class="mobile-menu-btn" aria-label="모바일 메뉴 열기">
                <span class="line"></span>
                <span class="line"></span>
                <span class="line"></span>
              </button>
            </div>
          </div>
        </div>
      </header>

      <main class="content-wrap">
        <section class="main-section-wrap">
          <div class="background-wrap">
            <div class="text-box">
              <div class="text-cover">
                <span>나의 첫 번째 AI 은행</span>
              </div>
              <div class="text-cover"><span>카카오 뱅크</span></div>
            </div>
            <div class="video-box">
              <video
                id="main-visual-video"
                muted=""
                loop=""
                autoplay=""
                playsinline=""
                webkit-playsinline=""
                preload="none"
                aria-label="카카오뱅크 메인 비주얼 영상"
              >
                <source src="./assets//videos/main-visual-video_pc.mp4" type="video/mp4" />
              </video>
            </div>
            <div class="scroll-down-box">
              <button aria-label="아래로 이동">
                <img src="./assets/images/ic-scroll-down.svg" alt="아래로 이동" />
              </button>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
